<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg2)"/>

  <!-- Outer progress ring track -->
  <circle cx="512" cy="512" r="360" fill="none" stroke="#bae6fd" stroke-width="60"/>
  <!-- Progress arc (~75%) -->
  <circle cx="512" cy="512" r="360" fill="none" stroke="#0284c7" stroke-width="60"
          stroke-dasharray="1696" stroke-dashoffset="424"
          stroke-linecap="round"
          transform="rotate(-90 512 512)"/>

  <!-- Inner white circle -->
  <circle cx="512" cy="512" r="270" fill="white"/>

  <!-- Water drop inside -->
  <path d="M512 310 C512 310 380 470 380 555 C380 628 439 685 512 685 C585 685 644 628 644 555 C644 470 512 310 512 310Z"
        fill="#0ea5e9"/>

  <!-- Shine on drop -->
  <ellipse cx="473" cy="490" rx="30" ry="50" fill="white" opacity="0.4" transform="rotate(-20 473 490)"/>
</svg>
