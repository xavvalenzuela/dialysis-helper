<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0369a1"/>
    </linearGradient>
    <linearGradient id="drop1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg1)"/>

  <!-- Arterial line (red) — left arc from upper-left, sweeps under droplet -->
  <path d="M 210 130 C 100 240, 60 420, 70 560 C 80 700, 160 800, 300 855 C 380 884, 444 888, 512 876"
        stroke="#7f1d1d" stroke-width="80" stroke-linecap="round" fill="none" opacity="0.85"/>
  <path d="M 210 130 C 100 240, 60 420, 70 560 C 80 700, 160 800, 300 855 C 380 884, 444 888, 512 876"
        stroke="#dc2626" stroke-width="56" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M 210 130 C 100 240, 60 420, 70 560 C 80 700, 160 800, 300 855 C 380 884, 444 888, 512 876"
        stroke="#fca5a5" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Venous line (blue) — right arc, mirrors arterial -->
  <path d="M 814 130 C 924 240, 964 420, 954 560 C 944 700, 864 800, 724 855 C 644 884, 580 888, 512 876"
        stroke="#1e3a8a" stroke-width="80" stroke-linecap="round" fill="none" opacity="0.85"/>
  <path d="M 814 130 C 924 240, 964 420, 954 560 C 944 700, 864 800, 724 855 C 644 884, 580 888, 512 876"
        stroke="#2563eb" stroke-width="56" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M 814 130 C 924 240, 964 420, 954 560 C 944 700, 864 800, 724 855 C 644 884, 580 888, 512 876"
        stroke="#93c5fd" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Port connectors at top -->
  <circle cx="210" cy="130" r="50" fill="#991b1b" opacity="0.9"/>
  <circle cx="210" cy="130" r="32" fill="#ef4444"/>
  <circle cx="197" cy="117" r="11" fill="#fecaca" opacity="0.7"/>

  <circle cx="814" cy="130" r="50" fill="#1e3a8a" opacity="0.9"/>
  <circle cx="814" cy="130" r="32" fill="#3b82f6"/>
  <circle cx="801" cy="117" r="11" fill="#bfdbfe" opacity="0.7"/>

  <!-- Water droplet -->
  <path d="M512 200 C512 200 308 455 308 592 C308 709 400 802 512 802 C624 802 716 709 716 592 C716 455 512 200 512 200Z"
        fill="url(#drop1)" opacity="0.97"/>

  <!-- Shine -->
  <ellipse cx="453" cy="492" rx="44" ry="72" fill="white" opacity="0.32" transform="rotate(-20 453 492)"/>

  <!-- Medical cross -->
  <rect x="492" y="614" width="40" height="116" rx="8" fill="#0369a1" opacity="0.48"/>
  <rect x="454" y="652" width="116" height="40" rx="8" fill="#0369a1" opacity="0.48"/>
</svg>
