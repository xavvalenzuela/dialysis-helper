<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0369a1"/>
    </linearGradient>
    <linearGradient id="drop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!--
    S-shaped bloodline — rectangular S with rounded bends.
    Path: starts top-right → left across top → down left side →
          right across middle → down right side → left across bottom → ends bottom-left
  -->

  <!-- Layer 1: dark outer shadow (depth) -->
  <path d="M 856 168
           L 236 168
           Q 150 168 150 254
           L 150 434
           Q 150 518 236 518
           L 788 518
           Q 874 518 874 604
           L 874 790
           Q 874 876 788 876
           L 168 876"
        stroke="#075985"
        stroke-width="86"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        opacity="0.75"/>

  <!-- Layer 2: main tube body — sky blue -->
  <path d="M 856 168
           L 236 168
           Q 150 168 150 254
           L 150 434
           Q 150 518 236 518
           L 788 518
           Q 874 518 874 604
           L 874 790
           Q 874 876 788 876
           L 168 876"
        stroke="#38bdf8"
        stroke-width="62"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        opacity="0.95"/>

  <!-- Layer 3: inner highlight — white sheen for cylindrical look -->
  <path d="M 856 168
           L 236 168
           Q 150 168 150 254
           L 150 434
           Q 150 518 236 518
           L 788 518
           Q 874 518 874 604
           L 874 790
           Q 874 876 788 876
           L 168 876"
        stroke="#f0f9ff"
        stroke-width="32"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        opacity="0.6"/>

  <!-- Port connector — top-right endpoint -->
  <circle cx="856" cy="168" r="54" fill="#0c4a6e" opacity="0.9"/>
  <circle cx="856" cy="168" r="36" fill="#38bdf8"/>
  <circle cx="843" cy="155" r="12" fill="#f0f9ff" opacity="0.7"/>

  <!-- Port connector — bottom-left endpoint -->
  <circle cx="168" cy="876" r="54" fill="#0c4a6e" opacity="0.9"/>
  <circle cx="168" cy="876" r="36" fill="#38bdf8"/>
  <circle cx="155" cy="863" r="12" fill="#f0f9ff" opacity="0.7"/>

  <!-- Water droplet — rendered on top of the S-line -->
  <path d="M512 155 C512 155 278 450 278 602 C278 728 386 824 512 824 C638 824 746 728 746 602 C746 450 512 155 512 155Z"
        fill="url(#drop)"
        opacity="0.97"/>

  <!-- Shine on droplet -->
  <ellipse cx="447" cy="494" rx="46" ry="76" fill="white" opacity="0.3" transform="rotate(-20 447 494)"/>

  <!-- Medical cross — sky blue so it reads cleanly on white -->
  <rect x="492" y="622" width="40" height="114" rx="9" fill="#7dd3fc" opacity="0.75"/>
  <rect x="452" y="662" width="120" height="40" rx="9" fill="#7dd3fc" opacity="0.75"/>
</svg>
