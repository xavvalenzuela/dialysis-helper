<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
    <linearGradient id="drop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1"/>
    </linearGradient>
    <!-- Red tube gradient for 3D effect -->
    <linearGradient id="redTube" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#991b1b"/>
      <stop offset="40%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </linearGradient>
    <!-- Blue tube gradient for 3D effect -->
    <linearGradient id="blueTube" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="40%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <filter id="tubeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- === BLOODLINES (drawn behind the water droplet) === -->

  <!-- Red arterial line — left arc, sweeps from upper-left down and under the droplet -->
  <!-- Outer tube body -->
  <path d="M 230 155 C 160 220, 90 380, 90 520 C 90 660, 160 780, 290 840 C 360 872, 435 878, 512 866"
        stroke="#991b1b" stroke-width="78" stroke-linecap="round" fill="none" opacity="0.92" filter="url(#tubeShadow)"/>
  <!-- Mid layer -->
  <path d="M 230 155 C 160 220, 90 380, 90 520 C 90 660, 160 780, 290 840 C 360 872, 435 878, 512 866"
        stroke="#ef4444" stroke-width="58" stroke-linecap="round" fill="none" opacity="0.9"/>
  <!-- Inner highlight — simulates tube's cylindrical sheen -->
  <path d="M 230 155 C 160 220, 90 380, 90 520 C 90 660, 160 780, 290 840 C 360 872, 435 878, 512 866"
        stroke="#fca5a5" stroke-width="18" stroke-linecap="round" fill="none" opacity="0.55"/>

  <!-- Blue venous line — right arc, mirrors the red line -->
  <path d="M 794 155 C 864 220, 934 380, 934 520 C 934 660, 864 780, 734 840 C 664 872, 589 878, 512 866"
        stroke="#1e3a8a" stroke-width="78" stroke-linecap="round" fill="none" opacity="0.92" filter="url(#tubeShadow)"/>
  <path d="M 794 155 C 864 220, 934 380, 934 520 C 934 660, 864 780, 734 840 C 664 872, 589 878, 512 866"
        stroke="#3b82f6" stroke-width="58" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M 794 155 C 864 220, 934 380, 934 520 C 934 660, 864 780, 734 840 C 664 872, 589 878, 512 866"
        stroke="#bfdbfe" stroke-width="18" stroke-linecap="round" fill="none" opacity="0.55"/>

  <!-- Connection port dots at the top of each bloodline -->
  <!-- Red port -->
  <circle cx="230" cy="155" r="46" fill="#991b1b" opacity="0.9"/>
  <circle cx="230" cy="155" r="30" fill="#ef4444"/>
  <circle cx="218" cy="143" r="10" fill="#fca5a5" opacity="0.7"/>

  <!-- Blue port -->
  <circle cx="794" cy="155" r="46" fill="#1e3a8a" opacity="0.9"/>
  <circle cx="794" cy="155" r="30" fill="#3b82f6"/>
  <circle cx="782" cy="143" r="10" fill="#bfdbfe" opacity="0.7"/>

  <!-- === WATER DROPLET (on top of bloodlines) === -->
  <path d="M512 200 C512 200 310 450 310 590 C310 706 402 800 512 800 C622 800 714 706 714 590 C714 450 512 200 512 200Z"
        fill="url(#drop)" opacity="0.97"/>

  <!-- Shine on drop -->
  <ellipse cx="452" cy="490" rx="42" ry="70" fill="white" opacity="0.35" transform="rotate(-20 452 490)"/>

  <!-- Small cross inside drop — medical symbol -->
  <rect x="492" y="610" width="40" height="120" rx="8" fill="#0284c7" opacity="0.5"/>
  <rect x="452" y="650" width="120" height="40" rx="8" fill="#0284c7" opacity="0.5"/>
</svg>
