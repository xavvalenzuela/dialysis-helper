<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0369a1"/>
    </linearGradient>
    <linearGradient id="drop2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg2)"/>

  <!-- S-shaped bloodline — flows directly behind the droplet, no red -->
  <!-- The S curves: top-center → sweeps left mid → curves right lower → exits bottom-center -->

  <!-- Outer shadow/depth -->
  <path d="M 512 120
             C 512 120, 620 180, 660 290
             C 700 400, 600 460, 512 512
             C 424 564, 324 624, 364 734
             C 400 840, 512 900, 512 900"
        stroke="#312e81" stroke-width="88" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>

  <!-- Main tube body — violet/indigo -->
  <path d="M 512 120
             C 512 120, 620 180, 660 290
             C 700 400, 600 460, 512 512
             C 424 564, 324 624, 364 734
             C 400 840, 512 900, 512 900"
        stroke="#6d28d9" stroke-width="64" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>

  <!-- Mid shimmer -->
  <path d="M 512 120
             C 512 120, 620 180, 660 290
             C 700 400, 600 460, 512 512
             C 424 564, 324 624, 364 734
             C 400 840, 512 900, 512 900"
        stroke="#8b5cf6" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85"/>

  <!-- Inner highlight — cylindrical sheen -->
  <path d="M 512 120
             C 512 120, 620 180, 660 290
             C 700 400, 600 460, 512 512
             C 424 564, 324 624, 364 734
             C 400 840, 512 900, 512 900"
        stroke="#c4b5fd" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>

  <!-- Port connectors at top and bottom -->
  <circle cx="512" cy="120" r="48" fill="#4c1d95" opacity="0.9"/>
  <circle cx="512" cy="120" r="30" fill="#7c3aed"/>
  <circle cx="500" cy="108" r="10" fill="#ddd6fe" opacity="0.7"/>

  <circle cx="512" cy="900" r="48" fill="#4c1d95" opacity="0.9"/>
  <circle cx="512" cy="900" r="30" fill="#7c3aed"/>
  <circle cx="500" cy="888" r="10" fill="#ddd6fe" opacity="0.7"/>

  <!-- Water droplet — on top of the S-line -->
  <path d="M512 200 C512 200 308 455 308 592 C308 709 400 802 512 802 C624 802 716 709 716 592 C716 455 512 200 512 200Z"
        fill="url(#drop2)" opacity="0.97"/>

  <!-- Shine -->
  <ellipse cx="453" cy="492" rx="44" ry="72" fill="white" opacity="0.32" transform="rotate(-20 453 492)"/>

  <!-- Medical cross -->
  <rect x="492" y="614" width="40" height="116" rx="8" fill="#0369a1" opacity="0.48"/>
  <rect x="454" y="652" width="116" height="40" rx="8" fill="#0369a1" opacity="0.48"/>
</svg>
